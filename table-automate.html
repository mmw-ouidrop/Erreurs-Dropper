<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OUIDROP — Table Automate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
<link rel="manifest" href="/favicon/site.webmanifest">
  <style>
    .header-brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;}
    .header-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
    .hamburger{display:none;background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:4px 8px;}

    .table-toolbar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .table-toolbar .search-wrap { flex: 1; min-width: 180px; }
    .filter-select { padding: 6px 10px; font-size: 12px; font-family: 'DM Mono', monospace; }
    .count-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-left: auto; white-space: nowrap; }

    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }

    .data-table tr.no-res td { border-left: 3px solid var(--warn); }

    [data-page="automate"] .nav-item[href="table-automate.html"] { color: var(--accent) !important; background: var(--accent-dim) !important; }
    @media (max-width: 768px) { .hamburger { display: block; } }
  </style>
</head>
<body data-page="automate">

<div class="app-shell">
  <header class="app-header">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="header-brand" onclick="window.location.href='index.html'" style="cursor:pointer;" title="Accueil">
      
      <span>OUIDROP</span>
    </div>
    <div class="header-right">
        <button class="btn btn-ghost btn-sm" onclick="window.location.href='search.html'" title="Recherche rapide">⌕</button>
<button class="btn btn-ghost btn-sm" onclick="logout()">⏻</button>
    </div>
  </header>

  <aside class="app-sidebar" id="sidebar">
    <div class="nav-section">
      <div class="nav-section-title">Navigation</div>
      <a class="nav-item" href="index.html"><span class="icon">⌂</span> Tableau de bord</a>
      <a class="nav-item" href="search.html"><span class="icon">⌕</span> Recherche erreurs</a>
      <a class="nav-item active" href="table-automate.html"><span class="icon">⊞</span> Table Automate</a>
      <a class="nav-item" href="table-lexium.html"><span class="icon">⊟</span> Table Lexium</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Outils</div>
      <a class="nav-item" href="notes.html"><span class="icon">✎</span> Notes de ticket</a>
      <a class="nav-item" href="stats.html"><span class="icon">◈</span> Statistiques</a>
    </div>
    <div class="nav-section">
      <button class="nav-item" onclick="logout()"><span class="icon">⏻</span> Déconnexion</button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <main class="app-main">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
      <h2>Table Automate</h2>
      <span class="badge badge-automate" id="totalBadge">—</span>
    </div>

    <div class="table-toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="filterInput" type="text" placeholder="Filtrer…" oninput="applyFilters()">
        <button class="search-clear" id="filterClear" onclick="clearFilter()">✕</button>
      </div>
      <select class="filter-select" id="empFilter" onchange="applyFilters()">
        <option value="">Tous les emplacements</option>
      </select>
      <select class="filter-select" id="docFilter" onchange="applyFilters()">
        <option value="">Tous</option>
        <option value="documented">Documentés</option>
        <option value="missing">Non documentés ⚠</option>
      </select>
      <span class="count-label" id="countLabel"></span>
    </div>

    <div class="table-wrap">
      <table class="data-table" id="mainTable">
        <thead>
          <tr>
            <th onclick="sortBy('code')" data-col="code">Code <span class="sort-icon">⇅</span></th>
            <th onclick="sortBy('emplacement')" data-col="emplacement">Emplacement <span class="sort-icon">⇅</span></th>
            <th onclick="sortBy('description')" data-col="description">Description <span class="sort-icon">⇅</span></th>
            <th>Cause connue</th>
            <th>Résolution</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--muted);">Chargement…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="core.js"></script>
<script>
if (!requireAuth()) throw new Error('Not authenticated');

let db = null;
let data = [];
let sortCol = 'code';
let sortDir = 1;

(async function init() {
  try { db = await getDB(); }
  catch(e) { db = getSampleData(); toast('Mode démo', 'warn'); }
  data = db.automate || [];
  document.getElementById('totalBadge').textContent = `${data.length} codes`;
  populateEmplacements();
  renderTable(data);
})();

function populateEmplacements() {
  const sel = document.getElementById('empFilter');
  const emps = [...new Set(data.map(r => r.emplacement).filter(Boolean))].sort();
  emps.forEach(e => { const o = document.createElement('option'); o.value = e; o.textContent = e; sel.appendChild(o); });
}

function applyFilters() {
  const q   = document.getElementById('filterInput').value.trim();
  const emp = document.getElementById('empFilter').value;
  const doc = document.getElementById('docFilter').value;
  document.getElementById('filterClear').style.display = q ? 'block' : 'none';

  let rows = data;
  if (q)    rows = rows.filter(r => fuzzyMatch(q, r.code) || fuzzyMatch(q, r.description) || fuzzyMatch(q, r.emplacement) || fuzzyMatch(q, r.causes));
  if (emp)  rows = rows.filter(r => r.emplacement === emp);
  if (doc === 'documented') rows = rows.filter(r => !isMissing(r.mesures));
  if (doc === 'missing')    rows = rows.filter(r => isMissing(r.mesures));
  renderTable(rows);
}

function clearFilter() {
  document.getElementById('filterInput').value = '';
  document.getElementById('filterClear').style.display = 'none';
  applyFilters();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('.data-table th[data-col]').forEach(th => {
    th.classList.toggle('sorted', th.dataset.col === col);
  });
  applyFilters();
}

function renderTable(rows) {
  // Sort
  rows = [...rows].sort((a, b) => {
    const av = a[sortCol] || ''; const bv = b[sortCol] || '';
    return sortDir * av.localeCompare(bv, 'fr', { numeric: true });
  });

  document.getElementById('countLabel').textContent = `${rows.length} ligne${rows.length > 1 ? 's' : ''}`;

  const tbody = document.getElementById('tableBody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--muted);">Aucun résultat</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const noRes = isMissing(r.mesures);
    const truncate = (s, n) => s && s.length > n ? s.slice(0, n) + '…' : (s || '');
    return `<tr class="${noRes ? 'no-res' : ''}" onclick="goToError('${r.code}','automate')" style="cursor:pointer;">
      <td class="code-cell">${r.code}</td>
      <td><span class="badge badge-missing" style="font-size:10px;">${r.emplacement || '—'}</span></td>
      <td class="desc-cell">${truncate(r.description, 80)}</td>
      <td style="font-size:12px;color:${isMissing(r.causes)?'var(--muted)':'var(--text2)'};">${isMissing(r.causes) ? '—' : truncate(r.causes, 60)}</td>
      <td>${noRes
        ? `<span class="badge badge-missing">⊘ Non documenté</span>`
        : `<span class="badge badge-ok">✓ Documenté</span>`
      }</td>
    </tr>`;
  }).join('');
}

function goToError(code, source) {
  addToHistory(code, source);
  window.location.href = `error.html?code=${code}&source=${source}`;
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}
</script>
</body>
</html>
